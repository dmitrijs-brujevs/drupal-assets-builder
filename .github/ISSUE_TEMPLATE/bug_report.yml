name: Bug report
description: Report a reproducible problem.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities here. Follow SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Package version
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include the command, minimal project structure, expected result, and actual result.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node, npm, operating system, and Drupal versions.
    validations:
      required: true
